<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Private Journal</title>
<link rel="manifest" href="manifest.json">

<style>
/* ===== GENERAL STYLES ===== */
body {
  font-family: "Consolas", monospace;
  margin: 0;
  background: #3b2f2a;
  color: #111;
  font-size: 0.95rem;
  font-weight: 500;
  line-height: 1.4rem;
  display: flex;
  justify-content: center;
  padding: 0.5rem 0;
}

#page {
  background: #fffdf5;
  width: 95%;
  max-width: 700px;
  padding: 0.7rem 1rem;
  box-shadow: 0 0 12px rgba(0,0,0,0.12);
  box-sizing: border-box;
  position: relative;
}

#page::before {
  content: "";
  position: absolute;
  left: 2rem;
  top: 0;
  bottom: 0;
  width: 1px;
  background: #f44;
}

h1 {
  text-align: center;
  margin: 0 0 0.3rem 0;
  font-size: 1.1rem;
}

#backupContainer {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  justify-content: flex-end;
  margin-bottom: 0.3rem;
}

#backupContainer button {
  font-size: 0.75rem;
  padding: 0.2rem 0.35rem;
  cursor: pointer;
  border: none;
  background: #f0f0f0;
  border-radius: 3px;
}

#importantFilter,
#focusModeBtn { opacity: 0.4; }
#importantFilter.active,
#focusModeBtn.active { opacity: 1; }

#inputContainer {
  position: sticky;
  top: 0;
  background: #fffdf5;
  padding: 0.15rem 0;
  border-bottom: 1px solid #ccc;
  display: flex;
  gap: 0.25rem;
  flex-wrap: wrap;
  z-index: 1;
}

#inputContainer .reminder {
  width: 100%;
  font-size: 0.75rem;
  color: #555;
  margin-bottom: 0.15rem;
}

#newEntry {
  flex: 1;
  padding: 0.3rem;
  font-size: 0.95rem;
  white-space: pre-wrap;
  word-wrap: break-word;
  resize: none;
  border: 1px solid #ccc;
  border-radius: 3px;
  background: #fffdf5;
}

#toolbar {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
}

#addBtn, #boldBtn, #capsBtn, #timestampBtn {
  font-size: 0.8rem;
  padding: 0.25rem 0.5rem;
  cursor: pointer;
  border: 1px solid #ccc;
  border-radius: 3px;
  background: #f5f5f0;
}

#entries {
  max-height: 60vh;
  overflow-y: auto;
  margin-top: 0.4rem;
}

/* ===== ENTRY FIX: TIMESTAMP BOTTOM ===== */
.entry {
  display: flex;
  flex-direction: column; /* stack note/actions above timestamp */
  padding: 0.25rem 0.2rem 0.4rem 0.2rem;
  position: relative;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.entry::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0.2rem;
  height: 1px;
  background: rgba(180, 200, 240, 0.4);
}

.noteContainer {
  display: flex;         /* note + actions in a row */
  align-items: flex-start;
  gap: 0.25rem;
}

/* note text */
.note {
  flex: 1;
  max-height: 4.2rem;
  overflow: hidden;
  color: #111;
}

.note.expanded { max-height: none; }

/* timestamp below noteContainer */
.timestamp {
  margin-left: 1.5rem;
  margin-top: 0.2rem;
  font-size: 0.75rem;
  color: #888;
}

.actions {
  display: flex;
  align-items: center;
}

.actions button {
  margin-left: 0.15rem;
  font-size: 0.7rem;
  cursor: pointer;
  background: none;
  border: none;
}

.importance { opacity: 0.4; }
.importance.active { opacity: 1; }

.expandBtn {
  font-size: 0.7rem;
  cursor: pointer;
  background: none;
  border: none;
  color: #0077cc;
}

#importFile { display: none; }

/* ===== MOBILE ===== */
/* ===== MOBILE ===== */
@media (max-width: 480px) {
  .entry {
    flex-direction: column;  /* stack note, timestamp, actions vertically */
    align-items: flex-start; 
  }
  .note {
    flex-basis: auto;
    margin-left: 1rem;
  }
  .timestamp {
    flex-basis: auto;
    margin-left: 1rem;
    margin-top: 0.1rem;
    font-size: 0.7rem;
  }
  .actions {
    flex-basis: auto;
    margin-left: 1rem;
    margin-top: 0.1rem;
  }
}

@media (max-width: 360px) {
  #page { padding: 0.5rem 0.5rem; }
  #newEntry { font-size: 0.8rem; }
  .note { margin-left: 2rem; }
}
</style>
</head>

<body>
<div id="page">
  <h1>Private Journal</h1>

  <div id="backupContainer">
    <button id="importantFilter">⭐</button>
    <button id="focusModeBtn">🎯</button>
    <button id="exportBtn">Export</button>
    <button id="importBtn">Import</button>
    <input type="file" id="importFile" accept=".txt">
    <input type="text" id="searchInput" placeholder="Search..." style="margin-left:5px; font-size:0.75rem;">
  </div>

  <div id="inputContainer">
    <div class="reminder">Press Enter for new line, tap + to save</div>
    <textarea id="newEntry" placeholder="Write note..." rows="2"></textarea>

    <div id="toolbar">
      <button id="addBtn">+</button>
      <button id="boldBtn">B</button>
      <button id="capsBtn">CAPS</button>
      <button id="timestampBtn">🕒</button>
    </div>
  </div>

  <div id="entries"></div>
</div>

<script>
// ===== SCRIPT =====
const entriesDiv = document.getElementById('entries');
const newEntryInput = document.getElementById('newEntry');
const importantFilterBtn = document.getElementById('importantFilter');
const focusModeBtn = document.getElementById('focusModeBtn');
const addBtn = document.getElementById('addBtn');
const boldBtn = document.getElementById('boldBtn');
const capsBtn = document.getElementById('capsBtn');
const timestampBtn = document.getElementById('timestampBtn');
const searchInput = document.getElementById('searchInput');

let entries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
let showImportantOnly = false;
let focusMode = false;
let boldOn = false;
let capsOn = false;

/* AUTO EXPAND */
function autoResize() {
  newEntryInput.style.height = 'auto';
  newEntryInput.style.height = newEntryInput.scrollHeight + 'px';
}
newEntryInput.addEventListener('input', autoResize);

/* ✅ COMPACT TIMESTAMP */
function getShortTimestamp() {
  const now = new Date();
  const day = now.getDate();
  const month = now.getMonth() + 1;
  const hours = now.getHours();
  const mins = String(now.getMinutes()).padStart(2, '0');
  return `${day}/${month} ${hours}:${mins}`;
}

/* ---- BUTTONS ---- */
importantFilterBtn.onclick = () => {
  showImportantOnly = !showImportantOnly;
  importantFilterBtn.classList.toggle('active', showImportantOnly);
  renderEntries();
};

focusModeBtn.onclick = () => {
  focusMode = !focusMode;
  focusModeBtn.classList.toggle('active', focusMode);
  renderEntries();
};

boldBtn.onclick = () => {
  boldOn = !boldOn;
  boldBtn.style.opacity = boldOn ? '1' : '0.6';
  newEntryInput.style.fontWeight = boldOn ? '700' : '500';
};

capsBtn.onclick = () => {
  capsOn = !capsOn;
  capsBtn.style.opacity = capsOn ? '1' : '0.6';
  newEntryInput.style.textTransform = capsOn ? 'uppercase' : 'none';
};

timestampBtn.onclick = () => {
  newEntryInput.value += getShortTimestamp();
  autoResize();
  newEntryInput.focus();
};

addBtn.onclick = addEntry;
newEntryInput.addEventListener('keypress', e => { if (e.key === 'Enter') return; });
searchInput.addEventListener('input', renderEntries);

function addEntry() {
  let text = newEntryInput.value.trim();
  if (!text) return;
  if (capsOn) text = text.toUpperCase();
  if (boldOn) text = `**${text}**`;

  const timestamp = getShortTimestamp();
  entries.unshift({ text, timestamp, important: false });
  localStorage.setItem('journalEntries', JSON.stringify(entries));
  newEntryInput.value = '';
  newEntryInput.style.height = 'auto';
  newEntryInput.style.fontWeight = '500';
  newEntryInput.style.textTransform = 'none';
  boldOn = capsOn = false;
  boldBtn.style.opacity = capsBtn.style.opacity = '0.6';
  renderEntries();
}

function renderEntries() {
  const query = searchInput.value.toLowerCase();
  entriesDiv.innerHTML = '';

  entries
    .filter(e => (!showImportantOnly || e.important) &&
      (!query || e.text.toLowerCase().includes(query)))
    .forEach((entry, i) => {
      if (focusMode) return;

      const div = document.createElement('div');
      div.className = 'entry';

      const noteContainer = document.createElement('div');
      noteContainer.className = 'noteContainer';

      const note = document.createElement('span');
      note.className = 'note';
      if (entry.text.startsWith("**") && entry.text.endsWith("**")) {
        note.innerHTML = "<strong>" + entry.text.slice(2, -2) + "</strong>";
      } else {
        note.textContent = entry.text;
      }

      const actions = document.createElement('div');
      actions.className = 'actions';

      const imp = document.createElement('button');
      imp.textContent = '⭐';
      imp.className = 'importance' + (entry.important ? ' active' : '');
      imp.onclick = () => {
        entry.important = !entry.important;
        localStorage.setItem('journalEntries', JSON.stringify(entries));
        renderEntries();
      };

      const copy = document.createElement('button');
      copy.textContent = '📋';
      copy.onclick = () => navigator.clipboard.writeText(entry.text);

      const del = document.createElement('button');
      del.textContent = '🗑';
      del.onclick = () => {
        entries.splice(i, 1);
        localStorage.setItem('journalEntries', JSON.stringify(entries));
        renderEntries();
      };

      actions.append(imp, copy, del);

      if (entry.text.split('\n').length > 3 || entry.text.length > 120) {
        const expand = document.createElement('button');
        expand.className = 'expandBtn';
        expand.textContent = '▶';
        expand.onclick = () => {
          note.classList.toggle('expanded');
          expand.textContent = note.classList.contains('expanded') ? '▼' : '▶';
        };
        actions.appendChild(expand);
      }

      noteContainer.append(note, actions);
      const ts = document.createElement('span');
      ts.className = 'timestamp';
      ts.textContent = entry.timestamp;

      div.append(noteContainer, ts);
      entriesDiv.appendChild(div);
    });
}

/* EXPORT / IMPORT */
document.getElementById('exportBtn').onclick = () => {
  const content = entries.map(e => `[${e.timestamp}]\n${e.text}\n------------------------`).join('\n');
  const blob = new Blob([content], {type:"text/plain"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `journal_backup_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
};

const importFile = document.getElementById('importFile');
document.getElementById('importBtn').onclick = () => importFile.click();
importFile.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const text = evt.target.result;
      const parts = text.split('------------------------').map(s => s.trim()).filter(s=>s);
      const imported = parts.map(part=>{
        const lines = part.split('\n');
        const tsMatch = lines[0].match(/\[(.+)\]/);
        const timestamp = tsMatch ? tsMatch[1] : new Date().toLocaleString();
        const noteText = lines.slice(1).join('\n').trim();
        return { timestamp, text: noteText, important:false };
      });
      entries = imported.reverse();
      localStorage.setItem('journalEntries', JSON.stringify(entries));
      renderEntries();
      alert("Journal imported successfully!");
    } catch(err){ alert("Failed to import. File might be corrupted."); }
  };
  reader.readAsText(file);
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
renderEntries();
</script>
</body>
</html>
